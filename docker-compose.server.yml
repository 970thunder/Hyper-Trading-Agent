name: hyper-trading-agent

# Server-facing overlay. Run this together with docker-compose.prod.yml.
# The API remains bound to 127.0.0.1 through .env.production; only the gateway
# is published to the network.
services:
  migrations:
    image: pgvector/pgvector:pg16
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: vibe_trading
      PGUSER: vibe
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - /bin/sh
      - -ec
      - |
        for migration in /migrations/*.sql; do
          echo "Applying $$migration"
          psql -v ON_ERROR_STOP=1 -f "$$migration"
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/proxy-locations.conf:/etc/nginx/includes/proxy-locations.conf:ro
    restart: unless-stopped

  api:
    depends_on:
      migrations:
        condition: service_completed_successfully

  worker:
    depends_on:
      migrations:
        condition: service_completed_successfully
