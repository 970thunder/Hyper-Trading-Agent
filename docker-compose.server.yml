name: hyper-trading-agent

# Server-facing overlay. Run this together with docker-compose.prod.yml.
# The API remains bound to 127.0.0.1 through .env.production; only the gateway
# is published to the network.
services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/proxy-locations.conf:/etc/nginx/includes/proxy-locations.conf:ro
    restart: unless-stopped
