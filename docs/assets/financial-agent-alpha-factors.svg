<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Alpha 因子研究流程</title><desc id="desc">展示多个因子信号、截面排序和因子检验的图解。</desc>
  <rect width="1600" height="900" fill="#f5f5f5"/><rect x="70" y="70" width="1460" height="760" rx="18" fill="#fff" stroke="#cccccc"/>
  <text x="130" y="154" fill="#1a1a1a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="44" font-weight="700">Alpha 因子：把可检验的投资假设变成可排序的分数</text>
  <g font-family="Segoe UI, Microsoft YaHei, sans-serif"><text x="135" y="236" fill="#404040" font-size="23" font-weight="700">候选信息</text><g transform="translate(130 270)"><rect width="214" height="92" rx="10" fill="#fff4f4" stroke="#ffccc4"/><path d="M28 60l28-30 26 16 34-38" fill="none" stroke="#de283b" stroke-width="7"/><text x="112" y="42" fill="#1a1a1a" font-size="22" font-weight="700">动量</text><text x="112" y="70" fill="#404040" font-size="17">趋势与变化率</text></g><g transform="translate(130 385)"><rect width="214" height="92" rx="10" fill="#ecfafa" stroke="#a8dde1"/><circle cx="54" cy="46" r="27" fill="none" stroke="#25b1bf" stroke-width="7"/><path d="M54 19v54M27 46h54" stroke="#25b1bf" stroke-width="5"/><text x="112" y="42" fill="#1a1a1a" font-size="22" font-weight="700">质量</text><text x="112" y="70" fill="#404040" font-size="17">盈利与稳健性</text></g><g transform="translate(130 500)"><rect width="214" height="92" rx="10" fill="#f5f5f5" stroke="#cccccc"/><path d="M30 62h50M55 26v50" stroke="#404040" stroke-width="7"/><text x="112" y="42" fill="#1a1a1a" font-size="22" font-weight="700">价值</text><text x="112" y="70" fill="#404040" font-size="17">估值与现金流</text></g><g transform="translate(130 615)"><rect width="214" height="92" rx="10" fill="#ecfafa" stroke="#a8dde1"/><path d="M28 58c18-54 43 30 63-32 14-42 40 26 52-17" fill="none" stroke="#25b1bf" stroke-width="6"/><text x="112" y="42" fill="#1a1a1a" font-size="22" font-weight="700">价量</text><text x="112" y="70" fill="#404040" font-size="17">流动性与波动</text></g>
  <path d="M380 452H545" stroke="#cccccc" stroke-width="5"/><path d="M535 442l19 10-19 10z" fill="#de283b"/><text x="420" y="418" fill="#404040" font-size="19">清洗、标准化、中性化</text>
  <g transform="translate(570 270)"><rect width="370" height="437" rx="12" fill="#f5f5f5" stroke="#cccccc"/><text x="28" y="48" fill="#1a1a1a" font-size="25" font-weight="700">截面排序</text><text x="28" y="77" fill="#404040" font-size="17">同一日期内比较相对强弱</text><g transform="translate(55 120)"><rect width="260" height="36" rx="7" fill="#dff4f5"/><rect width="75" height="36" rx="7" fill="#25b1bf"/><text x="282" y="25" fill="#005461" font-size="18">高分组</text></g><g transform="translate(55 181)"><rect width="260" height="36" rx="7" fill="#e9ecec"/><rect width="130" height="36" rx="7" fill="#929292"/></g><g transform="translate(55 242)"><rect width="260" height="36" rx="7" fill="#fff0f1"/><rect width="205" height="36" rx="7" fill="#de283b"/><text x="282" y="25" fill="#de283b" font-size="18">低分组</text></g><path d="M55 327H315" stroke="#cccccc" stroke-width="3"/><text x="55" y="365" fill="#404040" font-size="18">高分与低分组的未来收益差</text><text x="55" y="398" fill="#1a1a1a" font-size="23" font-weight="700">才是因子可检验的对象</text></g>
  <path d="M971 452H1106" stroke="#cccccc" stroke-width="5"/><path d="M1096 442l19 10-19 10z" fill="#25b1bf"/>
  <g transform="translate(1130 270)"><rect width="315" height="437" rx="12" fill="#fff" stroke="#a8dde1" stroke-width="2"/><text x="28" y="48" fill="#1a1a1a" font-size="25" font-weight="700">因子检验</text><g transform="translate(28 82)"><rect width="259" height="86" rx="8" fill="#ecfafa"/><text x="18" y="36" fill="#005461" font-size="22" font-weight="700">IC / ICIR</text><text x="18" y="62" fill="#404040" font-size="16">预测排序是否稳定</text></g><g transform="translate(28 184)"><rect width="259" height="86" rx="8" fill="#fff4f4"/><text x="18" y="36" fill="#de283b" font-size="22" font-weight="700">分组收益</text><text x="18" y="62" fill="#404040" font-size="16">是否存在单调结构</text></g><g transform="translate(28 286)"><rect width="259" height="86" rx="8" fill="#f5f5f5"/><text x="18" y="36" fill="#1a1a1a" font-size="22" font-weight="700">换手与成本</text><text x="18" y="62" fill="#404040" font-size="16">能否真实执行</text></g></g>
  </g>
  <text x="130" y="776" fill="#404040" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="19">因子库是候选信号集合，不是买入清单；任何公式都需要验证时间可得性、稳定性、成本与边际贡献。</text>
</svg>
