client_max_body_size 50m;

location = /health {
    access_log off;
    proxy_pass http://api:8899;
    proxy_set_header Host $host;
}

# Metrics and interactive API documentation remain available on the internal
# API network for operators and Prometheus, but are not public gateway routes.
location = /metrics { return 404; }
location = /openapi.json { return 404; }
location = /docs { return 404; }
location = /redoc { return 404; }

location = /auth/login {
    limit_req zone=login_per_ip burst=8 nodelay;
    proxy_pass http://api:8899;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# SSE needs buffering disabled and a long read timeout, while still sharing the
# public request-rate policy for connection establishment.
location ~ ^/sessions/[A-Za-z0-9_-]+/events$ {
    limit_req zone=api_per_ip burst=60 nodelay;
    proxy_pass http://api:8899;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location / {
    limit_req zone=api_per_ip burst=80 nodelay;
    proxy_pass http://api:8899;
    proxy_http_version 1.1;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
