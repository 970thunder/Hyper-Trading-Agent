<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">回测报告与风险评估</title><desc id="desc">展示策略净值、回撤、交易成本和风险指标的回测图解。</desc>
  <rect width="1600" height="900" fill="#f5f5f5"/><rect x="70" y="70" width="1460" height="760" rx="18" fill="#fff" stroke="#cccccc"/>
  <text x="130" y="154" fill="#1a1a1a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="44" font-weight="700">回测报告：收益、风险与可执行性必须一起看</text>
  <g transform="translate(130 220)"><rect width="890" height="465" rx="12" fill="#f5f5f5" stroke="#cccccc"/><text x="36" y="48" fill="#1a1a1a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">策略净值与回撤</text><g stroke="#cccccc" stroke-width="2"><path d="M42 112H848M42 205H848M42 298H848M42 391H848"/><path d="M110 80V410M270 80V410M430 80V410M590 80V410M750 80V410"/></g><path d="M44 352C105 330 132 333 181 291S249 274 296 237 359 276 409 216 484 178 530 211 591 249 638 164 708 128 752 171 804 142 846 101" fill="none" stroke="#25b1bf" stroke-width="10" stroke-linecap="round"/><path d="M44 352C105 330 132 333 181 291S249 274 296 237 359 276 409 216 484 178 530 211 591 249 638 164" fill="none" stroke="#de283b" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 1"/><path d="M530 211C554 239 585 250 606 217S631 184 638 164" fill="none" stroke="#de283b" stroke-width="16" stroke-linecap="round"/><path d="M580 312v-71" stroke="#de283b" stroke-width="3" stroke-dasharray="8 7"/><text x="603" y="335" fill="#de283b" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="20" font-weight="700">最大回撤区间</text><text x="42" y="440" fill="#404040" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">先验证数据、成交时点和成本，再解释收益曲线。</text></g>
  <g transform="translate(1070 220)" font-family="Segoe UI, Microsoft YaHei, sans-serif"><text x="0" y="26" fill="#1a1a1a" font-size="24" font-weight="700">报告阅读顺序</text><g transform="translate(0 60)"><rect width="330" height="96" rx="10" fill="#fff4f4" stroke="#ffccc4"/><circle cx="38" cy="48" r="17" fill="#de283b"/><text x="70" y="43" fill="#1a1a1a" font-size="21" font-weight="700">样本与数据</text><text x="70" y="70" fill="#404040" font-size="17">可得性、复权、幸存者</text></g><g transform="translate(0 174)"><rect width="330" height="96" rx="10" fill="#ecfafa" stroke="#a8dde1"/><circle cx="38" cy="48" r="17" fill="#25b1bf"/><text x="70" y="43" fill="#1a1a1a" font-size="21" font-weight="700">风险与回撤</text><text x="70" y="70" fill="#404040" font-size="17">波动、MDD、恢复期</text></g><g transform="translate(0 288)"><rect width="330" height="96" rx="10" fill="#f5f5f5" stroke="#cccccc"/><circle cx="38" cy="48" r="17" fill="#404040"/><text x="70" y="43" fill="#1a1a1a" font-size="21" font-weight="700">交易可行性</text><text x="70" y="70" fill="#404040" font-size="17">换手、滑点、流动性</text></g><g transform="translate(0 402)"><rect width="330" height="96" rx="10" fill="#fff4f4" stroke="#ffccc4"/><circle cx="38" cy="48" r="17" fill="#de283b"/><text x="70" y="43" fill="#1a1a1a" font-size="21" font-weight="700">稳健性验证</text><text x="70" y="70" fill="#404040" font-size="17">样本外、压力期、敏感性</text></g></g>
  <g transform="translate(130 735)" font-family="Segoe UI, Microsoft YaHei, sans-serif"><rect width="1340" height="48" rx="8" fill="#f5f5f5"/><text x="24" y="31" fill="#404040" font-size="19">高收益不等于好策略：应同时检查年化收益、夏普比率、最大回撤、交易次数、换手率、成本敏感性与样本外表现。</text></g>
</svg>
