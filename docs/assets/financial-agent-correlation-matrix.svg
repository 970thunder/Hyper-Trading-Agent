<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">相关性矩阵与组合分散化</title><desc id="desc">展示皮尔逊相关、斯皮尔曼秩相关和资产组合分散化的图解。</desc>
  <rect width="1600" height="900" fill="#f5f5f5"/><rect x="70" y="70" width="1460" height="760" rx="18" fill="#fff" stroke="#cccccc"/>
  <text x="130" y="154" fill="#1a1a1a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="44" font-weight="700">相关性矩阵：识别共同风险，而非寻找“永远分散”</text>
  <g transform="translate(130 232)" font-family="Segoe UI, Microsoft YaHei, sans-serif"><text x="0" y="0" fill="#404040" font-size="22" font-weight="700">资产或策略两两之间的共同变化</text><g transform="translate(0 35)"><rect width="570" height="500" rx="12" fill="#f5f5f5" stroke="#cccccc"/><g transform="translate(70 58)"><rect width="70" height="70" fill="#404040"/><rect x="76" width="70" height="70" fill="#de283b"/><rect x="152" width="70" height="70" fill="#ffccc4"/><rect x="228" width="70" height="70" fill="#dff4f5"/><rect x="304" width="70" height="70" fill="#25b1bf"/><rect y="76" width="70" height="70" fill="#de283b"/><rect x="76" y="76" width="70" height="70" fill="#404040"/><rect x="152" y="76" width="70" height="70" fill="#ff6366"/><rect x="228" y="76" width="70" height="70" fill="#f5f5f5"/><rect x="304" y="76" width="70" height="70" fill="#dff4f5"/><rect y="152" width="70" height="70" fill="#ffccc4"/><rect x="76" y="152" width="70" height="70" fill="#ff6366"/><rect x="152" y="152" width="70" height="70" fill="#404040"/><rect x="228" y="152" width="70" height="70" fill="#25b1bf"/><rect x="304" y="152" width="70" height="70" fill="#dff4f5"/><rect y="228" width="70" height="70" fill="#dff4f5"/><rect x="76" y="228" width="70" height="70" fill="#f5f5f5"/><rect x="152" y="228" width="70" height="70" fill="#25b1bf"/><rect x="228" y="228" width="70" height="70" fill="#404040"/><rect x="304" y="228" width="70" height="70" fill="#de283b"/><rect y="304" width="70" height="70" fill="#25b1bf"/><rect x="76" y="304" width="70" height="70" fill="#dff4f5"/><rect x="152" y="304" width="70" height="70" fill="#dff4f5"/><rect x="228" y="304" width="70" height="70" fill="#de283b"/><rect x="304" y="304" width="70" height="70" fill="#404040"/></g><text x="70" y="470" fill="#404040" font-size="18">深红：高同向暴露　青色：低相关或分散化候选</text></g></g>
  <g transform="translate(770 230)" font-family="Segoe UI, Microsoft YaHei, sans-serif"><g><rect width="635" height="170" rx="12" fill="#fff4f4" stroke="#ffccc4"/><circle cx="64" cy="85" r="36" fill="#de283b"/><path d="M43 101l17-31 17 12 20-34" fill="none" stroke="#fff" stroke-width="7"/><text x="128" y="69" fill="#1a1a1a" font-size="27" font-weight="700">皮尔逊相关</text><text x="128" y="104" fill="#404040" font-size="19">衡量连续数值的线性共同变动</text><text x="128" y="134" fill="#404040" font-size="17">适合收益、协方差与传统组合风险分析</text></g><g transform="translate(0 202)"><rect width="635" height="170" rx="12" fill="#ecfafa" stroke="#a8dde1"/><circle cx="64" cy="85" r="36" fill="#25b1bf"/><path d="M41 68h46M41 85h46M41 102h46" stroke="#fff" stroke-width="7" stroke-linecap="round"/><text x="128" y="69" fill="#1a1a1a" font-size="27" font-weight="700">斯皮尔曼秩相关</text><text x="128" y="104" fill="#404040" font-size="19">衡量相对排序的单调共同变化</text><text x="128" y="134" fill="#404040" font-size="17">适合因子 IC 与异常值较多的横截面研究</text></g><g transform="translate(0 404)"><rect width="635" height="130" rx="12" fill="#f5f5f5" stroke="#cccccc"/><path d="M66 65h122" stroke="#cccccc" stroke-width="4"/><circle cx="44" cy="65" r="24" fill="#25b1bf"/><circle cx="210" cy="65" r="24" fill="#de283b"/><circle cx="376" cy="65" r="24" fill="#404040"/><circle cx="542" cy="65" r="24" fill="#25b1bf"/><text x="28" y="112" fill="#404040" font-size="16">资产</text><text x="175" y="112" fill="#404040" font-size="16">策略</text><text x="338" y="112" fill="#404040" font-size="16">风险因子</text><text x="502" y="112" fill="#404040" font-size="16">对冲候选</text></g></g>
  <text x="130" y="780" fill="#404040" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="19">相关性接近零不代表未来独立；应结合滚动窗口、压力期和尾部共同损失进行判断。</text>
</svg>
