# Paste this server-context fragment into the Baota site's Nginx configuration
# after creating the normal reverse proxy to http://127.0.0.1:8899.

client_max_body_size 50m;

# Do not expose operator-only endpoints through the public Baota website.
location = /metrics { return 404; }
location = /openapi.json { return 404; }
location = /docs { return 404; }
location = /redoc { return 404; }

# Agent streaming uses Server-Sent Events and must not be buffered by Nginx.
location ~ ^/sessions/[A-Za-z0-9_-]+/events$ {
    proxy_pass http://127.0.0.1:8899;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
