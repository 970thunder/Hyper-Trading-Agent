<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">量化投研工作流</title><desc id="desc">从研究假设到受控验证的量化投研流程图。</desc>
  <rect width="1600" height="900" fill="#f5f5f5"/>
  <rect x="70" y="70" width="1460" height="760" rx="18" fill="#fff" stroke="#cccccc"/>
  <text x="130" y="160" fill="#1a1a1a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="44" font-weight="700">量化投研：从假设到可审计结论</text>
  <text x="130" y="207" fill="#404040" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="22">每一步都需要明确的数据边界、时间边界与风险约束</text>
  <path d="M250 456H1350" fill="none" stroke="#cccccc" stroke-width="4" stroke-linecap="round"/>
  <g font-family="Segoe UI, Microsoft YaHei, sans-serif" text-anchor="middle">
    <g transform="translate(250 456)"><circle r="78" fill="#fff" stroke="#de283b" stroke-width="5"/><circle r="43" fill="#ffccc4"/><path d="M-22 7c16-34 43-34 45-2 2 29-29 33-49 17" fill="none" stroke="#de283b" stroke-width="8" stroke-linecap="round"/><text y="126" fill="#1a1a1a" font-size="25" font-weight="700">研究假设</text><text y="158" fill="#404040" font-size="18">问题与经济逻辑</text></g>
    <g transform="translate(470 456)"><circle r="78" fill="#fff" stroke="#25b1bf" stroke-width="5"/><rect x="-38" y="-37" width="76" height="74" rx="7" fill="#dff4f5"/><path d="M-20-13h40M-20 3h40M-20 19h26" stroke="#005461" stroke-width="6" stroke-linecap="round"/><text y="126" fill="#1a1a1a" font-size="25" font-weight="700">数据边界</text><text y="158" fill="#404040" font-size="18">可得性与质量</text></g>
    <g transform="translate(690 456)"><circle r="78" fill="#fff" stroke="#de283b" stroke-width="5"/><path d="M-43 31L-15-5 7 11 42-34" fill="none" stroke="#de283b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="-43" cy="31" r="8" fill="#de283b"/><circle cx="-15" cy="-5" r="8" fill="#de283b"/><circle cx="7" cy="11" r="8" fill="#de283b"/><circle cx="42" cy="-34" r="8" fill="#de283b"/><text y="126" fill="#1a1a1a" font-size="25" font-weight="700">信号与因子</text><text y="158" fill="#404040" font-size="18">排序、分组、预测</text></g>
    <g transform="translate(910 456)"><circle r="78" fill="#fff" stroke="#25b1bf" stroke-width="5"/><path d="M-40 30V-30M-15 30V-6M10 30V-45M35 30V8" stroke="#005461" stroke-width="16" stroke-linecap="round"/><path d="M-49 40H49" stroke="#005461" stroke-width="5"/><text y="126" fill="#1a1a1a" font-size="25" font-weight="700">组合构建</text><text y="158" fill="#404040" font-size="18">权重与约束</text></g>
    <g transform="translate(1130 456)"><circle r="78" fill="#fff" stroke="#de283b" stroke-width="5"/><path d="M-45 25C-21-15-8 15 8-5S37-35 45-29" fill="none" stroke="#de283b" stroke-width="8" stroke-linecap="round"/><path d="M-45 41H45" stroke="#de283b" stroke-width="5"/><text y="126" fill="#1a1a1a" font-size="25" font-weight="700">历史回测</text><text y="158" fill="#404040" font-size="18">成本与制度模拟</text></g>
    <g transform="translate(1350 456)"><circle r="78" fill="#fff" stroke="#25b1bf" stroke-width="5"/><path d="M0-47L44-23v46L0 47l-44-24v-46z" fill="#dff4f5" stroke="#005461" stroke-width="5"/><path d="M-19 2l13 13 27-29" fill="none" stroke="#005461" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text y="126" fill="#1a1a1a" font-size="25" font-weight="700">风险复核</text><text y="158" fill="#404040" font-size="18">审批与归档</text></g>
  </g>
  <g fill="#de283b"><path d="M357 446l16 10-16 10z"/><path d="M577 446l16 10-16 10z"/><path d="M797 446l16 10-16 10z"/><path d="M1017 446l16 10-16 10z"/><path d="M1237 446l16 10-16 10z"/></g>
  <rect x="130" y="690" width="1340" height="82" rx="10" fill="#f5f5f5"/><circle cx="170" cy="731" r="10" fill="#de283b"/><text x="196" y="740" fill="#404040" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="21">核心原则：结果必须可复现、可解释、可追溯；任一环节失真都会让最终结论失效。</text>
